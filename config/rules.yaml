# GML CSV 點位處理工具 - 欄位對應設定檔
# 若程式無法自動判斷欄位，可在此新增欄位名稱對應
# 格式：標準欄位名: [CSV 中可能的欄位名稱, ...]
# 先填寫的名稱優先比對

column_aliases:
  id:
    - 識別碼
    - ID
    - 點位識別碼
    - point_id
    - 編號
    - 點號
  category:
    - 類別碼
    - 類別
    - 管種
    - category
    - type
    - CAT
  x:
    - X
    - E
    - X(E)
    - X座標
    - Easting
    - x
    - e
  y:
    - Y
    - N
    - Y(N)
    - Y座標
    - Northing
    - y
    - n
  z:
    - Z
    - H
    - Z(H)
    - 高程
    - Height
    - Elevation
    - elevation
    - z
    - h
  date:
    - 日期
    - 測量日期
    - 設置日期
    - 量測日期
    - survey_date
    - date
    - DATE

# 異常判定閾值
thresholds:
  # 平面距離容差（公尺）：超過此值視為「座標差異過大」
  xy_tolerance: 0.30
  # 高程容差（公尺）：超過此值視為「高程差異過大」
  z_tolerance: 0.10
