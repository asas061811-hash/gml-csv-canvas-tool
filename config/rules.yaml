# =========================================================
# 欄位對應規則設定檔
# 若程式無法自動辨識某個 CSV 的欄位名稱，
# 可在下方各欄位的清單中，加入該 CSV 實際使用的欄位名稱（中英文皆可）。
#
# 比對時會先去除欄位名稱前後空白，並將全形括號轉成半形括號後比對，
# 大小寫不分。
# =========================================================

field_aliases:
  # 原始識別碼 / 點名
  id:
    - "識別碼"
    - "ID"
    - "Id"
    - "id"
    - "點號"
    - "點名"
    - "編號"
    - "點位編號"
    - "Point ID"
    - "PointID"

  # 類別碼
  category:
    - "類別碼"
    - "類別"
    - "CODE"
    - "Code"
    - "code"
    - "種類"

  # X 座標 (E)
  x:
    - "X"
    - "x"
    - "E"
    - "e"
    - "X(E)"
    - "X（E）"
    - "E(X)"
    - "E（X）"
    - "X座標"
    - "東坐標"
    - "東座標"

  # Y 座標 (N)
  y:
    - "Y"
    - "y"
    - "N"
    - "n"
    - "Y(N)"
    - "Y（N）"
    - "N(Y)"
    - "N（Y）"
    - "Y座標"
    - "北坐標"
    - "北座標"

  # Z / 高程 (H)
  z:
    - "Z"
    - "z"
    - "H"
    - "h"
    - "Z(H)"
    - "Z（H）"
    - "H(Z)"
    - "H（Z）"
    - "高程"
    - "Z座標"

  # 測量 / 設置日期
  date:
    - "日期"
    - "測量日期"
    - "設置日期"
    - "施測日期"
    - "量測日期"
    - "Date"
    - "date"

# =========================================================
# 識別碼解析規則
# 規則：抓取識別碼結尾的連續數字作為「點號」，
# 其餘部分作為「管線識別碼」。
#
# 範例：
#   1-9-30mTE04~TB06-C1  ->  管線識別碼: 1-9-30mTE04~TB06-C   點號: 1
#   1-9-30mTE04~TB06-C6  ->  管線識別碼: 1-9-30mTE04~TB06-C   點號: 6
#
# 若識別碼結尾沒有數字，則整串視為管線識別碼，點號留空，
# 並於異常清單中標示「欄位缺漏」。
# =========================================================
id_parse:
  trailing_digit_regex: '^(.*?)(\d+)$'

# =========================================================
# 重複點位判定門檻
# =========================================================
duplicate_thresholds:
  xy_tolerance_m: 0.30
  z_tolerance_m: 0.10

# =========================================================
# CSV 讀取時依序嘗試的編碼
# =========================================================
csv_encodings:
  - "utf-8-sig"
  - "utf-8"
  - "big5"
  - "cp950"
  - "gb18030"
