# GML CSV 點位處理工具 - 欄位對應設定檔
# 若程式無法自動判斷欄位，可在此新增欄位名稱對應
# 格式：標準欄位名: [CSV 中可能的欄位名稱, ...]
# 先填寫的名稱優先比對

column_aliases:
  id:
    - 識別碼
    - ID
    - 點位識別碼
    - point_id
    - 編號
    - 點號
  category:
    - 類別碼
    - 類別
    - 管種
    - category
    - type
    - CAT
  x:
    - X
    - E
    - X(E)
    - X座標
    - Easting
    - x
    - e
  y:
    - Y
    - N
    - Y(N)
    - Y座標
    - Northing
    - y
    - n
  z:
    - Z
    - H
    - Z(H)
    - 高程
    - Height
    - Elevation
    - elevation
    - z
    - h
  date:
    - 日期
    - 測量日期
    - 設置日期
    - 量測日期
    - survey_date
    - date
    - DATE

# 異常判定閾值
thresholds:
  # 平面距離容差（公尺）：超過此值視為「座標差異過大」
  xy_tolerance: 0.30
  # 高程容差（公尺）：超過此值視為「高程差異過大」
  z_tolerance: 0.10

# ── 代碼定義對照表 ─────────────────────────────────
# 格式：代碼: 定義文字
# 工具會自動建立反向對照（定義→代碼）
code_mappings:
  作業區分:
    '0': 新建
    '1': 更新
    '2': 刪除

  壓力區分:
    '0': 特高壓
    '1': 高壓
    '2': 中壓
    '3': 低壓
    '4': 無加壓

  尺寸單位:
    '0': mm
    '1': inch
    '2': cm
    '3': m

  管線型態:
    '0': 地下
    '1': 架空
    '2': 附掛
    '3': 架道

  孔蓋種類:
    '0': 人孔
    '1': 手孔
    '2': 清除孔
    '3': 閘門
    '4': 虛擬節點

  孔蓋型態:
    '0': 地面
    '1': 下地
    '2': 柏油覆蓋

  開關閥型態:
    '0': 地面
    '1': 下地
    '2': 柏油覆蓋

  消防栓型態:
    '0': 地上單孔
    '1': 地上雙孔
    '2': 地下單孔
    '3': 地下雙孔
    '4': 其他

  號誌架設方式:
    '0': 專用桿
    '1': 附掛
    '2': 其他

  設施型態:
    '0': 地面
    '1': 地下

  使用狀態:
    '0': 使用
    '1': 停用

  資料狀態:
    '0': 實測
    '1': 既圖轉繪
